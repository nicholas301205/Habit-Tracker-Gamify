name: habbit_tracker_gamify
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.10.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.2.2

  # Utils
  uuid: ^4.5.0
  intl: ^0.20.2

  # Charts
  fl_chart: ^0.69.0

  # Notification
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Animation
  lottie: ^3.1.2

  # 🔥 AI + ENV
  flutter_dotenv: ^5.1.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env